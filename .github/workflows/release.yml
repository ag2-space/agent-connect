name: Release to PyPI

# Publishes ag2-agent-connect to PyPI when a v* tag is pushed.
# Auth is PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
#
# One-time owner setup (until this is done, tagging just fails the publish step
# harmlessly — nothing is published):
#   1. PyPI → Manage → Publishing → add a "pending publisher":
#        project: ag2-agent-connect
#        owner: ag2-space   repo: agent-connect
#        workflow: release.yml   environment: pypi
#      (a pending publisher works before the project's first release, so the
#       very first tag can publish the initial version.)
#   2. GitHub → repo Settings → Environments → create environment "pypi".
#
# Release flow after setup: bump agent_connect/__version__ (the single source —
# pyproject reads it dynamically), commit, then `git tag vX.Y.Z && git push --tags`.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Guard — git tag must match the package version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import agent_connect; print(agent_connect.__version__)')"
          echo "tag=$tag  package __version__=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match agent_connect.__version__ ($pkg). Bump __init__.py before tagging."
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
